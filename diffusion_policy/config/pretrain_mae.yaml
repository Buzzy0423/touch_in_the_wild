defaults:
  - task: umi       
  - _self_       

transforms:
  - type: RandomCrop
    ratio: 0.95
  - _target_: torchvision.transforms.ColorJitter
    brightness: 0.3
    contrast: 0.4
    saturation: 0.5
    hue: 0.08

dataloader:
  batch_size: 64
  num_workers: 0
  pin_memory: true

training:
  seed: 42
  val_ratio: 0.1
  # Fraction of (non-val) episodes used for training. 1.0 means use all train episodes.
  train_ratio: 0.2
  num_epochs: 5
  clip_lr: 3e-5
  encoder_lr: 1e-4
  embed_dim: 768
  num_heads: 8
  attention_type: "cls"  # or "patch"
  predict_channel: 1    # 1 or 3
  tact_patch_size: 4
  ema_pretrain: true
  ema_decay: 0.9995
  mask_ratio_min: 0.6   
  mask_ratio_max: 0.8  
  unmask_prob: 0.05

logging:
  project: umi
  tags:
    - pretrain

task:
  dataset_path: /home/zinan/Documents/zinan/data/touch_in_the_wild-dataset/pretrain_data/pretrain.zarr.zip
  cache_dir: /home/zinan/Documents/zinan/data/titw_cache