defaults:
  - task: xarm_square_insertion_sim_tactile
  - _self_

transforms:
  - type: RandomCrop
    ratio: 0.95
  - _target_: torchvision.transforms.ColorJitter
    brightness: 0.3
    contrast: 0.4
    saturation: 0.5
    hue: 0.08

dataloader:
  batch_size: 64
  num_workers: 0
  pin_memory: true

training:
  seed: 42
  val_ratio: 0.0
  train_ratio: 1.0
  num_epochs: 10
  clip_lr: 3e-5
  encoder_lr: 1e-4
  embed_dim: 768
  num_heads: 8
  attention_type: "cls"
  predict_channel: 1
  tact_patch_size: 4
  ema_pretrain: true
  ema_decay: 0.9995
  mask_ratio_min: 0.6
  mask_ratio_max: 0.8
  unmask_prob: 0.05

logging:
  project: umi
  tags:
    - pretrain
    - finetune_sim
